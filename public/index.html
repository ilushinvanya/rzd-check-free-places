<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>РЖД — Свободные места</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>РЖД — Свободные места в вагоне</h1>
    <div>Сервис использует открытые данные официального сайта РЖД. Мы не связаны с ОАО "РЖД". Схемы вагонов предоставляются для удобства пассажиров, уже купивших билет.</div>
    <div class="form-card">
      <div class="form-row">
        <div class="form-group">
          <label for="date">Дата поездки</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label for="ticketNumber">Номер билета</label>
          <input type="text" id="ticketNumber" placeholder="74966230272031" required value="74966230272031">
        </div>
        <button id="submitBtn" onclick="handleSubmit()">
          Проверить
          <span class="spinner" id="spinner"></span>
        </button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-card" id="resultCard">
      <div class="result-section">
        <h2>Информация о билете</h2>
        <div class="places-list" id="ticketData"></div>
      </div>

      <div class="result-section">
        <h2>Схема вагона</h2>
        <div class="svg-wrapper" id="svgWrapper"></div>
      </div>

      <div class="result-section">
        <div class="places-list" id="placesList"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
