<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>РЖД — Свободные места</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ЖД — Свободные места в вагоне</h1>
    <div>Сервис использует открытые данные официального сайта РЖД. Мы не связаны с ОАО "РЖД". Схемы вагонов предоставляются для удобства пассажиров, уже купивших билет.</div>
    <div class="form-card">
      <div class="form-row">

        <div class="form-group">
          <label for="ticketNumber">№ электронного билета или проездного документа</label>
          <div class="input-wrapper">
            <input type="text" id="ticketNumber" placeholder="14 символов" required>
            <button class="clear" onclick="clearTicketNumber()">✕</button>
          </div>
        </div>

        <div class="form-group">
          <label for="date">Дата поездки</label>
          <div class="input-wrapper">
            <input type="date" id="date" required>
            <button class="clear clear-date" onclick="clearDate()">✕</button>
          </div>
        </div>

        <button id="submitBtn" onclick="handleSubmit()">
          Проверить
          <span class="spinner" id="spinner"></span>
        </button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-card" id="resultCard">
      <div class="result-section">
        <h2>Информация о билете</h2>
        <div class="places-list" id="ticketData"></div>
      </div>

      <div class="result-section">
        <h2>Схема вагона</h2>
        <div class="svg-wrapper" id="svgWrapper"></div>
        <div class="designations">
          <div class="item">
            <div class="icon free"></div>
            <div class="text">Свободное</div>
          </div>
          <div class="item">
            <div class="icon busy"></div>
            <div class="text">Занятое место</div>
          </div>
        </div>
      </div>

      <div class="result-section">
        <div class="places-list" id="placesList"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
